name: klustr
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Samet Kum <kumsamet@gmail.com>
description: |
  Native Kubernetes desktop client.
  Cross-platform multi-context cluster management with live resource
  updates, log streaming, exec, port-forwarding, full RBAC, Custom
  Resource Definitions, Helm, Argo CD and Gateway API support.
  Nothing is installed in the cluster — Klustr drives the standard
  Kubernetes API using the user's ~/.kube/config.
vendor: Samet Kum
homepage: https://github.com/SametKUM/klustr
license: MIT
depends:
  - libwebkit2gtk-4.1-0
  - libgtk-3-0
contents:
  - src: build/bin/klustr
    dst: /usr/bin/klustr
    file_info:
      mode: 0755
  - src: build/linux/klustr.desktop
    dst: /usr/share/applications/klustr.desktop
  - src: build/appicon.png
    dst: /usr/share/icons/hicolor/512x512/apps/klustr.png
  - src: build/appicon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/klustr.svg
