version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - copyloopvar
    - prealloc
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
        - hugeParam
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
      - path: frontend/src/lib/wails/
        linters:
          - revive
          - staticcheck
          - unused

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - klustr

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
