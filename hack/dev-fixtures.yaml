kind: Secret
metadata:
  name: tls-cert
  namespace: klustr-demo-edge
type: kubernetes.io/tls
stringData:
  # Self-signed CN=klustr.local, valid 100 years. Generated once and
  # checked in; nothing connects to this so rotation is irrelevant.
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIIBkTCCATegAwIBAgIUbVm7sZ7y5sxmGRQbOsRtaA7q/eEwCgYIKoZIzj0EAwIw
    GDEWMBQGA1UEAwwNa2x1c3RyLmxvY2FsMCAXDTI1MDEwMTAwMDAwMFoYDzIxMjUw
    MTAxMDAwMDAwWjAYMRYwFAYDVQQDDA1rbHVzdHIubG9jYWwwWTATBgcqhkjOPQIB
    BggqhkjOPQMBBwNCAATdummytlsplaceholderkeyrandombase64encoded1234
    aGV5dGhpc2lzbm90YXJlYWxjZXJ0aWZpY2F0ZUlhbWp1c3RhcGxhY2Vob2xkZXIx
    ozIwMDAdBgNVHQ4EFgQUdummyowner1234567890wAfBgNVHSMEGDAWgBRdummyow
    bmVyMTIzNDU2Nzg5MDAKBggqhkjOPQQDAgNIADBFAiEA1234567890abcdefghij
    klmnopqrstuvwxyz0987654321QIgZYXWVUTSRQPONMLKJIHGFEDCBA0987654321
    -----END CERTIFICATE-----
