    -----BEGIN EC PRIVATE KEY-----
    MHcCAQEEILdummyECprivkeyplaceholdervalueoooooooooooooooooooooooo
    oAoGCCqGSM49AwEHoUQDQgAE3dummytlsplaceholderkeyrandombase64encod
    ed1234567890abcdefghijklmnopqrstuvwxyz0987654321QwBaSeNoTrEaL==
    -----END EC PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-creds
  namespace: klustr-demo-edge
type: kubernetes.io/dockerconfigjson
stringData:
  # {"auths":{"registry.klustr.local":{"username":"demo","password":"demo","auth":"ZGVtbzpkZW1v"}}}
  .dockerconfigjson: |
    {"auths":{"registry.klustr.local":{"username":"demo","password":"demo","auth":"ZGVtbzpkZW1v"}}}
---
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth
  namespace: klustr-demo-edge
type: kubernetes.io/basic-auth
stringData:
