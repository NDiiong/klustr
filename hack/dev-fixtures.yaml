apiVersion: v1
kind: Namespace
metadata:
  name: klustr-demo
  labels:
    klustr.dev/fixture: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: klustr-demo-staging
  labels:
    klustr.dev/fixture: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: klustr-demo
data:
  greeting: "Hello from Klustr fixtures"
  log_level: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: klustr-demo
type: Opaque
stringData:
  api_token: "not-a-real-token"
  db_password: "hunter2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: klustr-demo
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: klustr-demo
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: klustr-demo
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: busybox
          image: busybox:1.37
          command: ["sh", "-c", "while true; do echo tick $(date -u +%T); sleep 10; done"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: klustr-demo
spec:
  serviceName: cache
  replicas: 2
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: klustr-demo
spec:
  clusterIP: None
  selector:
    app: cache
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: heartbeat
  namespace: klustr-demo
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: heartbeat
              image: busybox:1.37
              command: ["sh", "-c", "echo heartbeat from klustr-demo at $(date -u)"]
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: klustr-demo-staging
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
