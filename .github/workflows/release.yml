name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Apple Silicon)
            platform: darwin/arm64
            suffix: darwin-arm64.tar.gz
          - os: windows-latest
            label: Windows (amd64)
            platform: windows/amd64
            suffix: windows-amd64.zip
          - os: ubuntu-22.04
            label: Linux (amd64)
            platform: linux/amd64
            suffix: linux-amd64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute artifact name
        id: artifact
        shell: bash
        run: |
          echo "name=klustr-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          wails build \
            -platform ${{ matrix.platform }} \
            -ldflags "-X klustr/app.Version=${{ steps.ver.outputs.version }}" \
            -trimpath \
            -clean

      - name: Package macOS
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cd build/bin
          tar -czf ${{ steps.artifact.outputs.name }} klustr.app

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd build/bin
          Compress-Archive -Path klustr.exe -DestinationPath ${{ steps.artifact.outputs.name }}

      - name: Package Linux
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          cd build/bin
          tar -czf ${{ steps.artifact.outputs.name }} klustr

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/bin/${{ steps.artifact.outputs.name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/klustr-*-darwin-*
          generate_release_notes: true
          append_body: true
          body: |
            ## Install (macOS Apple Silicon)

            The build is not notarized yet — run these in your terminal:

            ```bash
            # Download
            curl -LO https://github.com/SametKUM/klustr/releases/download/${{ github.ref_name }}/klustr-${{ github.ref_name }}-darwin-arm64.tar.gz

            # Extract and move into /Applications
            tar -xzf klustr-${{ github.ref_name }}-darwin-arm64.tar.gz
            mv klustr.app /Applications/

            # Clear the quarantine attribute so Gatekeeper lets it run
            xattr -cr /Applications/klustr.app

            # Launch
            open /Applications/klustr.app
            ```
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
