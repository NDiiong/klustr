name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Apple Silicon)
            platform: darwin/arm64
            suffix: darwin-arm64.tar.gz
          - os: windows-latest
            label: Windows (amd64)
            platform: windows/amd64
            suffix: windows-amd64.zip
          - os: ubuntu-22.04
            label: Linux (amd64)
            platform: linux/amd64
            suffix: linux-amd64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute artifact name
        id: artifact
        shell: bash
        run: |
          echo "name=klustr-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          wails build \
            -platform ${{ matrix.platform }} \
            -ldflags "-X klustr/app.Version=${{ steps.ver.outputs.version }}" \
            -trimpath \
            -clean

      - name: Sign macOS app
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          KEYCHAIN=klustr-build.keychain
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          rm -f cert.p12
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/ { print $2; exit }')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in keychain" >&2
            exit 1
          fi
          codesign --deep --force --timestamp --options runtime \
            --entitlements build/darwin/entitlements.plist \
            --sign "$IDENTITY" build/bin/klustr.app
          codesign --verify --deep --strict --verbose=2 build/bin/klustr.app

      - name: Notarize macOS app
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -e
          ditto -c -k --keepParent build/bin/klustr.app notarize.zip

          SUBMIT_JSON=$(xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --output-format json)
          echo "Submit response: $SUBMIT_JSON"
          SUBMISSION_ID=$(echo "$SUBMIT_JSON" | jq -r '.id')
          if [ -z "$SUBMISSION_ID" ] || [ "$SUBMISSION_ID" = "null" ]; then
            echo "Failed to obtain submission id" >&2
            exit 1
          fi
          echo "Submission id: $SUBMISSION_ID"

          MAX_WAIT=3600
          INTERVAL=30
          ELAPSED=0
          FAILS=0
          while true; do
            if INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$TEAM_ID" \
                --password "$APPLE_PASSWORD" \
                --output-format json 2>&1); then
              FAILS=0
              STATUS=$(echo "$INFO_JSON" | jq -r '.status // "Unknown"')
              echo "[${ELAPSED}s] status=$STATUS"
              case "$STATUS" in
                Accepted)
                  break
                  ;;
                "In Progress")
                  ;;
                Invalid|Rejected)
                  echo "Notarization rejected with status: $STATUS"
                  xcrun notarytool log "$SUBMISSION_ID" \
                    --apple-id "$APPLE_ID" \
                    --team-id "$TEAM_ID" \
                    --password "$APPLE_PASSWORD" || true
                  exit 1
                  ;;
                *)
                  echo "Unexpected status: $STATUS"
                  echo "$INFO_JSON"
                  exit 1
                  ;;
              esac
            else
              FAILS=$((FAILS + 1))
              echo "[${ELAPSED}s] notarytool info failed (transient $FAILS/5): $INFO_JSON"
              if [ "$FAILS" -ge 5 ]; then
                echo "Too many consecutive transient failures, giving up" >&2
                exit 1
              fi
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "Timed out after ${MAX_WAIT}s waiting for Apple" >&2
              exit 1
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          xcrun stapler staple build/bin/klustr.app
          rm -f notarize.zip

      - name: Package macOS
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cd build/bin
          tar -czf ${{ steps.artifact.outputs.name }} klustr.app

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd build/bin
          Compress-Archive -Path klustr.exe -DestinationPath ${{ steps.artifact.outputs.name }}

      - name: Package Linux
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          cd build/bin
          tar -czf ${{ steps.artifact.outputs.name }} klustr

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/bin/${{ steps.artifact.outputs.name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/klustr-*-darwin-*
          generate_release_notes: true
          append_body: true
          body: |
            ## Install (macOS Apple Silicon)

            The build is signed with a Developer ID and notarized by Apple, so Gatekeeper opens it without the quarantine prompt.

            ```bash
            # Download
            curl -LO https://github.com/SametKUM/klustr/releases/download/${{ github.ref_name }}/klustr-${{ github.ref_name }}-darwin-arm64.tar.gz

            # Extract and move into /Applications
            tar -xzf klustr-${{ github.ref_name }}-darwin-arm64.tar.gz
            mv klustr.app /Applications/

            # Launch
            open /Applications/klustr.app
            ```
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
