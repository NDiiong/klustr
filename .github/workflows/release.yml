name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Apple Silicon)
            platform: darwin/arm64
            suffix: darwin-arm64.tar.gz
          # Windows build disabled — no Windows asset is shipped yet, and the
          # runner adds ~5 minutes per release. Re-enable when the v1 path
          # picks up cross-platform distribution.
          # - os: windows-latest
          #   label: Windows (amd64)
          #   platform: windows/amd64
          #   suffix: windows-amd64.zip
          - os: ubuntu-24.04
            label: Linux (amd64)
            platform: linux/amd64
            suffix: linux-amd64.tar.gz
            tags: webkit2_41
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails CLI
        id: wails-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-cli-v2.12.0-${{ runner.os }}

      - name: Install Wails CLI
        if: steps.wails-cache.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Resolve version and artifact name
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=klustr-${VERSION}-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"
          DEB_VERSION="${VERSION#v}"
          echo "deb_version=${DEB_VERSION}" >> "$GITHUB_OUTPUT"
          echo "deb_name=klustr_${DEB_VERSION}_amd64.deb" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          TAGS_ARG=""
          if [ -n "${{ matrix.tags }}" ]; then
            TAGS_ARG="-tags ${{ matrix.tags }}"
          fi
          wails build \
            $TAGS_ARG \
            -platform ${{ matrix.platform }} \
            -ldflags "-X klustr/app.Version=${{ steps.meta.outputs.version }}" \
            -trimpath \
            -clean

      - name: Import code-signing certificate
        if: startsWith(matrix.os, 'macos')
        uses: Apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Sign macOS app
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | awk '/Developer ID Application/ { print $2; exit }')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in keychain" >&2
            exit 1
          fi
          codesign --force --timestamp --options runtime \
            --entitlements build/darwin/entitlements.plist \
            --sign "$IDENTITY" build/bin/klustr.app
          codesign --verify --strict --verbose=2 build/bin/klustr.app

      - name: Notarize macOS app
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/bin/klustr.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple build/bin/klustr.app
          rm -f notarize.zip

      - name: Package macOS
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cd build/bin
          tar -czf ${{ steps.meta.outputs.name }} klustr.app

      # - name: Package Windows
      #   if: matrix.os == 'windows-latest'
      #   shell: pwsh
      #   run: |
      #     cd build/bin
      #     Compress-Archive -Path klustr.exe -DestinationPath ${{ steps.meta.outputs.name }}

      - name: Package Linux
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          cd build/bin
          tar -czf ${{ steps.meta.outputs.name }} klustr

      - name: Build Linux .deb
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        env:
          NFPM_VERSION: "2.46.3"
          VERSION: ${{ steps.meta.outputs.deb_version }}
        run: |
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp nfpm
          /tmp/nfpm package \
            --config build/linux/nfpm.yaml \
            --packager deb \
            --target "build/bin/${{ steps.meta.outputs.deb_name }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.name }}
          path: build/bin/${{ steps.meta.outputs.name }}
          if-no-files-found: error

      - if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.deb_name }}
          path: build/bin/${{ steps.meta.outputs.deb_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/klustr-*-darwin-arm64.tar.gz
            artifacts/klustr-*-linux-amd64.tar.gz
            artifacts/klustr_*_amd64.deb
          generate_release_notes: true
          append_body: true
          body: |
            ## Install (macOS Apple Silicon)

            The build is signed with a Developer ID Application certificate and notarized by Apple.

            ### Homebrew

            ```bash
            brew tap sametkum/klustr
            brew install klustr
            ```

            ### Manual

            ```bash
            curl -LO https://github.com/SametKUM/klustr/releases/download/${{ github.ref_name }}/klustr-${{ github.ref_name }}-darwin-arm64.tar.gz
            tar -xzf klustr-${{ github.ref_name }}-darwin-arm64.tar.gz
            mv klustr.app /Applications/
            open /Applications/klustr.app
            ```

            ## Install (Linux amd64)

            The Linux build links against `webkit2gtk-4.1` + `gtk-3`. Ubuntu
            24.04+, Fedora 39+, Arch and most modern distros ship those
            runtime libraries by default; on Ubuntu 22.04 install
            `libwebkit2gtk-4.1-0 libgtk-3-0` first.

            ### Debian / Ubuntu (.deb)

            The .deb pulls in the runtime dependencies automatically and
            registers a `klustr` desktop entry.

            ```bash
            VERSION="${{ github.ref_name }}"; DEB="klustr_${VERSION#v}_amd64.deb"
            curl -LO "https://github.com/SametKUM/klustr/releases/download/${VERSION}/${DEB}"
            sudo apt install "./${DEB}"
            ```

            ### Manual (tarball)

            ```bash
            curl -LO https://github.com/SametKUM/klustr/releases/download/${{ github.ref_name }}/klustr-${{ github.ref_name }}-linux-amd64.tar.gz
            tar -xzf klustr-${{ github.ref_name }}-linux-amd64.tar.gz
            install -Dm755 klustr ~/.local/bin/klustr
            klustr
            ```
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Bump Homebrew cask
        if: "!contains(github.ref_name, '-')"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is not set; skipping cask bump." >&2
            exit 0
          fi
          VERSION="${TAG#v}"
          ASSET="artifacts/klustr-${TAG}-darwin-arm64.tar.gz"
          if [ ! -f "$ASSET" ]; then
            echo "Expected asset $ASSET not found." >&2
            exit 1
          fi
          SHA=$(sha256sum "$ASSET" | awk '{print $1}')
          git clone "https://x-access-token:${GH_TOKEN}@github.com/SametKUM/homebrew-klustr.git" tap
          cd tap
          python3 - "$VERSION" "$SHA" <<'PY'
          import pathlib, re, sys
          version, sha = sys.argv[1], sys.argv[2]
          path = pathlib.Path("Casks/klustr.rb")
          text = path.read_text()
          text = re.sub(r'^( *version )"[^"]*"', rf'\1"{version}"', text, count=1, flags=re.M)
          text = re.sub(r'^( *sha256 )"[^"]*"', rf'\1"{sha}"', text, count=1, flags=re.M)
          path.write_text(text)
          PY
          if git diff --quiet; then
            echo "Cask already at ${VERSION}, nothing to bump."
            exit 0
          fi
          git config user.name "klustr-release-bot"
          git config user.email "noreply@github.com"
          git add Casks/klustr.rb
          git commit -m "klustr ${VERSION}"
          git push

      - name: Check AUR secret
        id: aur_secret
        if: "!contains(github.ref_name, '-')"
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AUR_SSH_PRIVATE_KEY secret is not set; AUR bump will be skipped."
          fi

      - name: Render klustr-bin PKGBUILD
        if: "!contains(github.ref_name, '-') && steps.aur_secret.outputs.configured == 'true'"
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          TARBALL="artifacts/klustr-${TAG}-linux-amd64.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            echo "Expected asset $TARBALL not found." >&2
            exit 1
          fi
          SHA_TARBALL=$(sha256sum "$TARBALL" | awk '{print $1}')
          SHA_DESKTOP=$(sha256sum build/linux/klustr.desktop | awk '{print $1}')
          SHA_PNG=$(sha256sum build/appicon.png | awk '{print $1}')
          SHA_SVG=$(sha256sum build/appicon.svg | awk '{print $1}')
          mkdir -p build/aur/rendered
          sed -e "s|@VERSION@|${VERSION}|g" \
              -e "s|@SHA_TARBALL@|${SHA_TARBALL}|g" \
              -e "s|@SHA_DESKTOP@|${SHA_DESKTOP}|g" \
              -e "s|@SHA_PNG@|${SHA_PNG}|g" \
              -e "s|@SHA_SVG@|${SHA_SVG}|g" \
              build/aur/PKGBUILD.tmpl > build/aur/rendered/PKGBUILD
          cat build/aur/rendered/PKGBUILD

      - name: Deploy klustr-bin to AUR
        if: "!contains(github.ref_name, '-') && steps.aur_secret.outputs.configured == 'true'"
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: klustr-bin
          pkgbuild: build/aur/rendered/PKGBUILD
          commit_username: klustr-release-bot
          commit_email: noreply@github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: klustr-bin ${{ github.ref_name }}
          ssh_keyscan_types: ed25519
